<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>sumFib</title>
  <meta name="description" content="A small puzzle game — slide tiles and combine pairs whose sum is a Fibonacci number.">
  <meta name="theme-color" content="#18120e">
  <meta property="og:title" content="sumFib">
  <meta property="og:description" content="A small puzzle game — slide tiles and combine pairs whose sum is a Fibonacci number.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <a class="skip-link" href="#board">Skip to game board</a>

  <main class="game">
    <header class="hud">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">φ</span>
        <h1 class="brand-title">sumFib</h1>
      </div>
      <div class="scores">
        <div class="score-card">
          <span class="score-label">Score</span>
          <output id="score" class="score-value" aria-live="polite" aria-atomic="true">0</output>
        </div>
        <div class="score-card">
          <span class="score-label">Best</span>
          <span id="best" class="score-value">0</span>
        </div>
        <button id="newgame" class="new-game" type="button" aria-label="Start a new game">New</button>
      </div>
    </header>

    <section class="board-wrap" aria-label="Game board">
      <div id="board" class="board" role="grid" aria-rowcount="5" aria-colcount="3" tabindex="0"
        aria-describedby="hint"></div>
    </section>

    <footer class="footer">
      <p id="hint" class="hint">
        Slide with <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or swipe.
        Combine adjacent tiles whose sum is a Fibonacci number.
        <kbd>R</kbd> restarts.
      </p>
    </footer>
  </main>

  <div id="status" role="status" aria-live="polite" class="visually-hidden"></div>

  <dialog id="gameover" aria-labelledby="gameover-title">
    <h2 id="gameover-title">Sum-thing is over</h2>
    <p class="dialog-row">Final score: <strong id="final-score">0</strong></p>
    <p class="dialog-row">Best: <strong id="final-best">0</strong></p>
    <form method="dialog">
      <button type="submit" value="restart" class="dialog-btn" autofocus>Play again</button>
    </form>
  </dialog>

  <script src="./script.js" defer></script>
</body>

</html>
